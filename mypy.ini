[mypy]
python_version = 3.11
strict = true
mypy_path = src
packages = jarvis
plugins = pydantic.mypy
warn_unused_configs = true
warn_return_any = true
show_error_codes = true
namespace_packages = true
explicit_package_bases = true

[mypy-uvicorn.*]
ignore_missing_imports = true

[mypy-ollama.*]
ignore_missing_imports = true

[mypy-openjarvis.*]
ignore_missing_imports = true

[mypy-anthropic.*]
ignore_missing_imports = true

[mypy-google.*]
ignore_missing_imports = true

[mypy-googleapiclient.*]
ignore_missing_imports = true
