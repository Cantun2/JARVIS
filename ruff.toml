line-length = 100
target-version = "py311"
src = ["src", "tests"]

[lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC", "RUF"]
ignore = [
    "B008",     # FastAPI Depends() in defaults is idiomatic
    "RUF001",   # caractères "ambigus" : on écrit du français + des emojis
    "RUF002",
    "RUF003",
]

[lint.per-file-ignores]
"tests/**" = ["S101"]

[lint.isort]
known-first-party = ["jarvis"]
